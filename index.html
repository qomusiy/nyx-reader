<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Nyx Reader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <header class="topbar">
      <div class="topbar-left">
        <button id="menu-button" class="menu-button" type="button" aria-label="Menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M4 7h16M4 12h16M4 17h16" />
          </svg>
        </button>

        <nav id="menu" class="menu" hidden>
          <div id="menu-status" class="menu-info">No document open</div>
          <hr class="menu-sep" />

          <label class="menu-item" for="file-input"><span class="menu-icon">＋</span>Open PDF</label>
          <input id="file-input" type="file" accept="application/pdf,.pdf" hidden />

          <hr class="menu-sep" />

          <div class="menu-zoom">
            <button id="zoom-out" class="zoom-step" type="button" aria-label="Zoom out">−</button>
            <span id="zoom-label" class="zoom-label">Fit width</span>
            <button id="zoom-in" class="zoom-step" type="button" aria-label="Zoom in">+</button>
          </div>
          <button id="fit-width" class="menu-item" type="button"><span class="menu-icon">⤢</span>Fit width</button>

          <hr class="menu-sep" />

          <button id="toggle-continuous" class="menu-item menu-item-split on" type="button">
            <span><span class="menu-icon">⧉</span>Continuous</span><span class="check">✓</span>
          </button>
          <button id="cycle-spread" class="menu-item menu-item-split" type="button">
            <span><span class="menu-icon">▦</span>Two-page view</span><span id="spread-state" class="menu-state">Off</span>
          </button>
          <button id="rotate" class="menu-item" type="button"><span class="menu-icon">⟳</span>Rotate right</button>
          <button id="toggle-invert" class="menu-item menu-item-split" type="button">
            <span><span class="menu-icon">◐</span>Invert page colors</span><span class="check">✓</span>
          </button>

          <hr class="menu-sep" />

          <button id="save-pdf" class="menu-item" type="button"><span class="menu-icon">⤓</span>Save annotated copy</button>
          <button id="properties" class="menu-item" type="button"><span class="menu-icon">ⓘ</span>Properties</button>
          <button id="shortcuts" class="menu-item" type="button"><span class="menu-icon">⌨</span>Keyboard shortcuts</button>

          <hr class="menu-sep" />

          <button id="theme-toggle" class="menu-item" type="button">
            <span class="menu-icon" id="theme-icon">☾</span><span id="theme-label">Night mode</span>
          </button>
        </nav>

        <button id="tools-toggle" class="icon-btn" type="button" title="Annotation tools" aria-label="Annotation tools" hidden>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z" /></svg>
        </button>

        <div id="annotation-tools" class="annotation-tools" hidden>
          <div class="topbar-divider"></div>
          <button id="tool-select" class="tool-btn active" type="button" title="Select / read">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"><path d="M5 3l6 17 2.4-7 7-2.4z" /></svg>
          </button>
          <button id="tool-highlight" class="tool-btn" type="button" title="Highlight text">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20h16" /><path d="M9 16l-4 1 1-4 8.4-8.4a2.1 2.1 0 0 1 3 3z" /></svg>
          </button>
          <button id="tool-note" class="tool-btn" type="button" title="Add note">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16v11H9l-4 3z" /></svg>
          </button>
          <div id="highlight-colors" class="highlight-colors" hidden>
            <button class="swatch active" type="button" data-color="#fff066" style="--swatch:#fff066" aria-label="Yellow"></button>
            <button class="swatch" type="button" data-color="#9ce28b" style="--swatch:#9ce28b" aria-label="Green"></button>
            <button class="swatch" type="button" data-color="#ffb3c8" style="--swatch:#ffb3c8" aria-label="Pink"></button>
            <button class="swatch" type="button" data-color="#9fd2ff" style="--swatch:#9fd2ff" aria-label="Blue"></button>
          </div>
        </div>
      </div>

      <div id="doc-title" class="doc-title"></div>

      <div class="topbar-right">
        <button id="dict-button" class="icon-btn" type="button" title="Dictionary" aria-label="Dictionary">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5a2 2 0 0 1 2-2h13v18H6a2 2 0 0 0-2 2z" /><path d="M19 17H6a2 2 0 0 0-2 2" /></svg>
        </button>
        <button id="find-button" class="icon-btn" type="button" title="Find in document (Ctrl+F)" hidden>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7" /><path d="M21 21l-4-4" /></svg>
        </button>
      </div>
    </header>

    <div id="find-bar" class="find-bar" hidden>
      <input id="find-input" class="find-input" type="text" placeholder="Find in document" autocomplete="off" spellcheck="false" />
      <span id="find-count" class="find-count"></span>
      <button id="find-prev" class="find-nav" type="button" aria-label="Previous match">↑</button>
      <button id="find-next" class="find-nav" type="button" aria-label="Next match">↓</button>
      <button id="find-close" class="find-nav" type="button" aria-label="Close">✕</button>
    </div>

    <div class="workspace">
      <div id="viewer-container" class="viewer-container">
        <div id="welcome" class="welcome">
          <div class="welcome-card">
            <div class="welcome-icon">PDF</div>
            <h1>Open a document</h1>
            <p>Read PDFs beautifully and double-click an English word for its translation.</p>
            <label class="welcome-open-button" for="file-input">Choose PDF</label>
          </div>
        </div>
        <div id="viewer" class="pdfViewer"></div>
      </div>

      <div id="scrim" class="scrim"></div>

      <aside class="dictionary-panel" aria-label="Dictionary">
        <button id="sheet-grabber" class="sheet-grabber" type="button" aria-label="Resize dictionary"></button>
        <div class="dictionary-header">
          <span class="dictionary-label">DICTIONARY</span>
          <div class="search-box">
            <input
              id="search-input"
              class="search-input"
              type="text"
              placeholder="Search words or phrases…"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
            />
            <span class="search-icon" aria-hidden="true">⌕</span>
            <div id="suggestions" class="suggestions" hidden></div>
          </div>
        </div>

        <div id="dictionary-content" class="dictionary-content">
          <div class="dictionary-empty">
            <div class="dictionary-empty-icon">Aa</div>
            <p>Double-click an English word in the PDF, or type one above, to see its translation and examples.</p>
          </div>
        </div>
      </aside>
    </div>

    <div id="modal" class="modal" hidden>
      <div class="modal-card">
        <div class="modal-head">
          <h3 id="modal-title"></h3>
          <button id="modal-close" class="modal-close" type="button" aria-label="Close">✕</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
